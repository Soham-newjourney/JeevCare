<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Leaderboard | JeevCare</title>
    <link rel="stylesheet" href="/css/index.css">
    <style>
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-row:last-child {
            border-bottom: none;
        }

        .rank {
            font-size: 1.5rem;
            font-weight: 800;
            color: #d1d5db;
            width: 40px;
        }

        .rank.top-1 {
            color: gold;
        }

        .rank.top-2 {
            color: silver;
        }

        .rank.top-3 {
            color: #cd7f32;
        }
    </style>
</head>

<body class="dash-layout">
    <div id="nav-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="dash-main animate-fade-in">
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Community Leaderboard</h1>
        <p style="color: #6b7280; margin-bottom: 30px;">Top citizens driving impact in the community.</p>

        <div class="glass-card" style="padding: 0;">
            <div id="leaderboardList">Loading...</div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await window.API.get('/community/leaderboard');
                if (res.data.length === 0) {
                    document.getElementById('leaderboardList').innerHTML = '<p style="padding: 20px;">No ranking data yet.</p>';
                    return;
                }
                document.getElementById('leaderboardList').innerHTML = res.data.map((c, i) => {
                    let rankClass = `top-${i + 1}`;
                    let badges = c.badges.map(b => `<span style="font-size:0.8rem; background:#fef3c7; color:#b45309; padding: 2px 6px; border-radius:10px; margin-left: 5px;">${b}</span>`).join('');
                    return `
                        <div class="leaderboard-row">
                            <div style="display:flex; align-items:center;">
                                <div class="rank ${rankClass}">#${i + 1}</div>
                                <div>
                                    <h3 style="margin:0;">${c.user ? c.user.name : 'Anonymous'}</h3>
                                    <div style="margin-top: 5px;">${badges}</div>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 1.2rem; font-weight: bold; color: var(--brand-primary);">${c.trustScore}</div>
                                <div style="font-size: 0.8rem; color: #6b7280;">Trust Score</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('leaderboardList').innerHTML = '<p style="padding: 20px; color: red;">Error loading leaderboard.</p>';
            }
        });
    </script>
    <script src="/js/layout.js"></script>
    <script>
        window.Layout.renderAppNav('nav-placeholder', 'Citizen Portal');
        window.Layout.renderSidebar('sidebar-placeholder', 'citizen', 'leaderboard');
    </script>
</body>

</html>
