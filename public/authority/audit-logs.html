<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs | JeevCare Authority</title>
    <link rel="stylesheet" href="/css/index.css">
    <style>
        .log-entry {
            font-family: monospace;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            background: #fafafa;
            margin-bottom: 5px;
            border-radius: 4px;
        }

        .log-action {
            font-weight: bold;
            color: var(--brand-primary);
        }
    </style>
</head>

<body class="dash-layout">

    <div id="nav-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="dash-main animate-fade-in">
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">System Audit Logs</h1>
        <p style="color: #6b7280; margin-bottom: 30px;">Immutable record of sensitive administrative actions.</p>

        <div id="loader">Fetching audit logs...</div>

        <div class="glass-card" style="display: none;" id="logsCard">
            <div id="logsContainer">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const lc = document.getElementById('logsCard');
            const container = document.getElementById('logsContainer');
            const loader = document.getElementById('loader');

            try {
                const res = await window.API.get('/authority/audit-logs');
                const logs = res.data;

                loader.style.display = 'none';
                lc.style.display = 'block';

                if (logs.length === 0) {
                    container.innerHTML = '<p>No audit logs found.</p>';
                    return;
                }

                logs.forEach(log => {
                    const date = new Date(log.createdAt).toLocaleString();
                    const userName = log.performedBy ? log.performedBy.name : 'Unknown User';
                    const userRole = log.performedBy ? log.performedBy.role : 'N/A';

                    const el = document.createElement('div');
                    el.className = 'log-entry';
                    el.innerHTML = `
                        <span style="color:#6b7280;">[${date}]</span> 
                        <span class="log-action">${log.action}</span> by 
                        <strong>${userName} (${userRole})</strong> 
                        &rarr; Target: ${log.targetModel} [${log.targetId || 'N/A'}]
                    `;
                    container.appendChild(el);
                });
            } catch (err) {
                loader.innerText = 'Failed to load audit logs: ' + err.message;
            }
        });
    </script>
    <script src="/js/layout.js"></script>
    <script>
        window.Layout.renderAppNav('nav-placeholder', 'Authority');
        window.Layout.renderSidebar('sidebar-placeholder', 'authority', 'audit-logs');
    </script>
</body>

</html>
