<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Reports | JeevCare Authority</title>
    <link rel="stylesheet" href="/css/index.css">
</head>

<body class="dash-layout">

    <div id="nav-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="dash-main animate-fade-in">
        <h1 style="font-size: 2.2rem; margin-bottom: 30px;">All Jurisdiction Reports</h1>

        <div id="loader">Fetching cases...</div>

        <div class="glass-card" style="padding: 0; overflow: hidden; display: none;" id="tableCard">
            <div class="table-responsive">
                <table class="data-table" style="width: 100%; border-collapse: collapse;">
                    <thead style="background: rgba(0,0,0,0.02); text-align: left;">
                        <tr>
                            <th style="padding: 15px 20px; border-bottom: 1px solid #eee;">Date</th>
                            <th style="padding: 15px 20px; border-bottom: 1px solid #eee;">Reporter</th>
                            <th style="padding: 15px 20px; border-bottom: 1px solid #eee;">Animal</th>
                            <th style="padding: 15px 20px; border-bottom: 1px solid #eee;">Status</th>
                            <th style="padding: 15px 20px; border-bottom: 1px solid #eee; text-align: right;">Action
                            </th>
                        </tr>
                    </thead>
                    <tbody id="reportsBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tc = document.getElementById('tableCard');
            const tb = document.getElementById('reportsBody');
            const loader = document.getElementById('loader');

            const loadCases = async () => {
                try {
                    const res = await window.API.get('/authority/cases');
                    const cases = res.data;

                    loader.style.display = 'none';
                    tc.style.display = 'block';
                    tb.innerHTML = '';

                    cases.forEach(incident => {
                        const date = new Date(incident.createdAt).toLocaleDateString();
                        const reporter = incident.reporter ? incident.reporter.name : 'Anonymous';

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="padding: 15px 20px; border-bottom: 1px solid #eee;">${date}</td>
                            <td style="padding: 15px 20px; border-bottom: 1px solid #eee;">${reporter}</td>
                            <td style="padding: 15px 20px; border-bottom: 1px solid #eee;">${incident.animalType}</td>
                            <td style="padding: 15px 20px; border-bottom: 1px solid #eee;">
                                <span class="status-pill status-${incident.status}">${incident.status.replace('_', ' ')}</span>
                            </td>
                            <td style="padding: 15px 20px; border-bottom: 1px solid #eee; text-align: right;">
                                ${incident.status !== 'false_report' ? `<button class="btn btn-outline" onclick="markFalse('${incident._id}')" style="padding: 4px 10px; font-size: 0.8rem; border-color: var(--color-danger); color: var(--color-danger);">Flag as False</button>` : `<span style="color:#6b7280; font-size: 0.8rem;">Flagged</span>`}
                            </td>
                        `;
                        tb.appendChild(tr);
                    });
                } catch (err) {
                    loader.innerText = 'Failed to load cases: ' + err.message;
                }
            };

            window.markFalse = async (id) => {
                if (confirm('Are you sure you want to mark this incident as a FALSE REPORT? This will penalize the reporter.')) {
                    try {
                        await window.API.patch(`/authority/cases/${id}/mark-false`);
                        alert('Marked as false report successfully.');
                        loadCases(); // reload list
                    } catch (err) {
                        alert('Error: ' + err.message);
                    }
                }
            };

            loadCases();
        });
    </script>
    <script src="/js/layout.js"></script>
    <script>
        window.Layout.renderAppNav('nav-placeholder', 'Authority');
        window.Layout.renderSidebar('sidebar-placeholder', 'authority', 'reports');
    </script>
</body>

</html>
