<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JeevCare</title>
    <link rel="stylesheet" href="/css/index.css">
    <style>
        body {
            background: linear-gradient(135deg, hsl(210, 30%, 96%) 0%, hsl(152, 68%, 95%) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .error-msg {
            color: var(--color-danger);
            background: hsla(354, 70%, 54%, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container auth-container animate-fade-in">
        <div class="auth-header">
            <a href="/index.html" class="nav-logo" style="justify-content: center;">🐾 JeevCare</a>
            <p class="mt-40">Welcome back! Please login to your account.</p>
        </div>

        <div class="glass-card">
            <div id="errorBox" class="error-msg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginBtn">Sign
                    In</button>
            </form>
            <div class="text-center mt-40" style="font-size: 0.9rem;">
                Don't have an account? <a href="/auth/register-citizen.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');

            btn.innerText = "Signing in...";
            btn.disabled = true;
            errorBox.style.display = "none";

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await window.API.post('/auth/login', payload);
                window.API.setToken(res.data.token);
                localStorage.setItem('jeevcare_user', JSON.stringify(res.data));
                window.API.redirectByRole(res.data.role);
            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.style.display = "block";
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
