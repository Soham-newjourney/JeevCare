<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability | JeevCare Provider</title>
    <link rel="stylesheet" href="/css/index.css">
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }

        .agenda-day {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid #eee;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .agenda-header {
            background: rgba(0, 0, 0, 0.02);
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slot-block {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f9fafb;
            transition: var(--transition-fast);
        }

        .slot-block:last-child {
            border-bottom: none;
        }

        .slot-block:hover {
            background: #f9fafb;
        }

        .time-badge {
            background: hsla(207, 90%, 54%, 0.1);
            color: var(--brand-primary);
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: var(--border-radius);
            border: 2px dashed #e5e7eb;
        }
    </style>
</head>

<body class="dash-layout">
    <div id="nav-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="dash-main animate-fade-in">
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Schedule Availability</h1>
        <p style="color: #6b7280; margin-bottom: 30px;">Open your time slots to allow citizens to book physical or
            virtual consultations.</p>

        <div class="split-layout">
            <!-- Left: Add Slots Control Panel -->
            <div class="glass-card" style="position: sticky; top: 20px;">
                <h3 style="margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                    <span style="color: var(--color-success);">+</span> New Time Slot
                </h3>
                <form id="addSlotForm" style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Date</label>
                        <input type="date" id="slotDate" class="form-input" required>
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Start Time</label>
                        <input type="time" id="slotTime" class="form-input" required>
                    </div>
                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; margin-top: 10px; padding: 12px;">Publish Slot to Citizens</button>
                    <div id="errorMsg" class="error-msg" style="display: none; margin-top: 10px;"></div>
                </form>
            </div>

            <!-- Right: Agenda Timeline -->
            <div>
                <h3 style="margin-bottom: 20px;">Your Upcoming Schedule</h3>
                <div id="slotsContainer">
                    <p style="color: #6b7280;">Loading slots...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        const renderSlots = (slots) => {
            const container = document.getElementById('slotsContainer');
            if (!slots || slots.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 15px;">📅</div>
                        <h3 style="margin-bottom: 5px;">Your calendar is completely open</h3>
                        <p style="color: #6b7280; max-width: 300px; margin: 0 auto;">You have no published time slots. Use the control panel to start accepting bookings.</p>
                    </div>
                `;
                return;
            }

            // Group slots by Date
            const grouped = {};
            slots.forEach(slot => {
                const dateObj = new Date(slot.date + 'T' + slot.time);

                // create a key based on YYYY-MM-DD for grouping
                if (isNaN(dateObj)) return; // skip corrupt data

                const dictKey = slot.date;
                if (!grouped[dictKey]) {
                    // Pre-format the nice header string for the day once
                    const options = { weekday: 'long', month: 'short', day: 'numeric' };
                    grouped[dictKey] = {
                        niceHeader: dateObj.toLocaleDateString('en-US', options),
                        slots: []
                    };
                }

                // Add the specific slot time
                const displayTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                grouped[dictKey].slots.push({ ...slot, displayTime, timeObj: dateObj });
            });

            // Sort dates chronologically
            const sortedDates = Object.keys(grouped).sort((a, b) => new Date(a) - new Date(b));

            let html = '';
            sortedDates.forEach(dateStr => {
                const group = grouped[dateStr];

                // Sort the times within that day
                group.slots.sort((a, b) => a.timeObj - b.timeObj);

                let slotsHtml = '';
                group.slots.forEach(s => {
                    slotsHtml += `
                        <div class="slot-block">
                            <span class="time-badge">🕒 ${s.displayTime}</span>
                            <button class="btn btn-outline" style="color: var(--color-danger); border: none; padding: 5px 15px;" onclick="removeSlot('${s._id}')">Remove</button>
                        </div>
                    `;
                });

                html += `
                    <div class="agenda-day">
                        <div class="agenda-header">
                            🗓️ ${group.niceHeader}
                        </div>
                        ${slotsHtml}
                    </div>
                `;
            });

            container.innerHTML = html;
        };

        const loadSlots = async () => {
            try {
                try {
                    const profileRes = await window.API.get('/auth/profile');
                    if (profileRes.data.profile && profileRes.data.profile.serviceType === 'shelter') {
                        const adoptionsNav = document.getElementById('nav-item-adoptions');
                        if (adoptionsNav) adoptionsNav.style.display = 'flex';
                    }
                } catch (e) { }
                const res = await window.API.get('/services/slots');
                renderSlots(res.data);
            } catch (err) {
                document.getElementById('slotsContainer').innerHTML = `<div class="empty-state"><p style="color: var(--color-danger);">Error: ${err.message}</p></div>`;
            }
        };

        document.getElementById('addSlotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('slotDate').value;
            const time = document.getElementById('slotTime').value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';

            try {
                const res = await window.API.post('/services/slots', { date, time });
                renderSlots(res.data);
                document.getElementById('addSlotForm').reset();
            } catch (err) {
                errorDiv.innerText = err.message || 'Failed to add slot';
                errorDiv.style.display = 'block';
            }
        });

        window.removeSlot = async (id) => {
            try {
                const res = await window.API.delete(`/services/slots/${id}`);
                renderSlots(res.data);
            } catch (err) {
                alert('Error removing slot: ' + err.message);
            }
        };

        document.addEventListener('DOMContentLoaded', loadSlots);
    </script>
    <script src="/js/layout.js"></script>
    <script>
        window.Layout.renderAppNav('nav-placeholder', 'Service Provider');
        window.Layout.renderSidebar('sidebar-placeholder', 'service_provider', 'availability');
    </script>
</body>

</html>
