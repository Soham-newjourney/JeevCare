<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authority Dashboard | JeevCare</title>
    <link rel="stylesheet" href="/css/index.css">
    <style>
        .metric-card {
            text-align: center;
            padding: 40px 20px;
        }

        .metric-number {
            font-size: 3rem;
            font-family: var(--font-heading);
            font-weight: 800;
            color: var(--brand-primary);
            margin-bottom: 10px;
        }

        .metric-label {
            color: #6b7280;
            font-size: 1.1rem;
            font-weight: 500;
        }
    </style>
</head>

<body class="dash-layout">

    <div id="nav-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="dash-main animate-fade-in">
        <h1 style="font-size: 2.5rem;">Authority Overview</h1>
        <p style="color: #6b7280; margin-bottom: 40px;">Real-time oversight of critical incidents and system-wide
            analytics.</p>

        <div class="grid-3 mb-20">
            <div class="glass-card metric-card">
                <div class="metric-number" id="m_total">0</div>
                <div class="metric-label">Total Incidents</div>
            </div>
            <div class="glass-card metric-card">
                <div class="metric-number" id="m_active">0</div>
                <div class="metric-label">Active Cases</div>
            </div>
            <div class="glass-card metric-card">
                <div class="metric-number" id="m_closed">0</div>
                <div class="metric-label">Closed Cases</div>
            </div>
        </div>

        <div class="glass-card" style="margin-top: 40px;">
            <h3>Quick Actions</h3>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <a href="/authority/alerts.html" class="btn btn-primary">Broadcast Alert</a>
                <a href="/authority/reports.html" class="btn btn-outline">View Audit Logs</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Fetch analytics
                const res = await window.API.get('/authority/analytics');
                const data = res.data;

                document.getElementById('m_total').innerText = data.totalIncidents;
                document.getElementById('m_active').innerText = data.activeCases;
                document.getElementById('m_closed').innerText = data.closedCases;

            } catch (e) {
                console.error("Dashboard error:", e);
            }
        });
    </script>
    <script src="/js/layout.js"></script>
    <script>
        window.Layout.renderAppNav('nav-placeholder', 'Authority Portal');
        window.Layout.renderSidebar('sidebar-placeholder', 'authority', 'dashboard');
    </script>
</body>

</html>
