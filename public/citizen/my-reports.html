<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports | JeevCare</title>
    <link rel="stylesheet" href="/css/index.css">
    <style>
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .report-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border: 1px solid #eee;
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            transition: var(--transition-fast);
        }

        .report-card:hover {
            border-color: var(--brand-primary);
        }

        .meta-text {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .grid-header {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: var(--brand-dark);
        }

        .urgency-badge {
            background: hsla(354, 70%, 54%, 0.1);
            color: var(--color-danger);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-left: 10px;
        }
    </style>
</head>

<body class="dash-layout">

    <div id="nav-placeholder"></div>

    <div id="sidebar-placeholder"></div>

    <main class="dash-main animate-fade-in">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="font-size: 2.2rem; margin: 0;">Case History</h1>
            <a href="/citizen/report.html" class="btn btn-primary">+ New Report</a>
        </div>

        <div id="loader">Fetching your reports...</div>
        <div id="reportsContainer" class="report-list" style="display: none;">
            <!-- Rendered list items will go here -->
        </div>

        <div id="emptyState" class="glass-card text-center" style="display: none; padding: 60px;">
            <div style="font-size: 3rem; margin-bottom: 20px;">📋</div>
            <h3>No reports yet</h3>
            <p style="color: #6b7280; margin-bottom: 20px;">You haven't reported any emergencies.</p>
            <a href="/citizen/report.html" class="btn btn-primary">Make First Report</a>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('reportsContainer');
            const loader = document.getElementById('loader');
            const emptyState = document.getElementById('emptyState');

            try {
                const res = await window.API.get('/incidents/my-reports');
                const reports = res.data;

                loader.style.display = 'none';

                if (reports.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                container.style.display = 'flex';
                reports.forEach(report => {
                    const date = new Date(report.createdAt).toLocaleString();
                    const urgencyHTML = report.urgencyFlag ? `<span class="urgency-badge">SOS Critical</span>` : '';

                    const el = document.createElement('div');
                    el.className = 'report-card';
                    el.innerHTML = `
                        <div>
                            <div class="grid-header">${report.animalType} - ${report.concernType} ${urgencyHTML}</div>
                            <div class="meta-text">Reported on: ${date}</div>
                            <div class="meta-text">Location: Lat ${report.location.coordinates[1].toFixed(4)}, Lng ${report.location.coordinates[0].toFixed(4)}</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="status-pill status-${report.status}">${report.status.replace('_', ' ')}</div>
                            <div style="margin-top: 15px;">
                                <a href="/citizen/incident-detail.html?id=${report._id}" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.85rem;">View Details</a>
                            </div>
                        </div>
                    `;
                    container.appendChild(el);
                });

            } catch (e) {
                loader.innerText = "Error loading reports: " + e.message;
            }
        });
    </script>
    <script src="/js/layout.js"></script>

    <script>
        window.Layout.renderAppNav('nav-placeholder', 'Citizen Portal');
        window.Layout.renderSidebar('sidebar-placeholder', 'citizen', 'history');
    </script>
</body>

</html>
