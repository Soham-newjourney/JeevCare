<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cases Pool | JeevCare</title>
    <link rel="stylesheet" href="/css/index.css">
    <style>
        .case-card {
            background: white;
            border: 1px solid #e5e7eb;
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .urgent-tag {
            color: var(--color-danger);
            font-weight: bold;
            background: hsla(354, 70%, 54%, 0.1);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
        }

        .meta {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
    </style>
</head>

<body class="dash-layout">

    <div id="nav-placeholder"></div>

    <div id="sidebar-placeholder"></div>

    <main class="dash-main animate-fade-in">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="font-size: 2.2rem; margin: 0;">Assigned Cases Pool</h1>
        </div>
        <p style="color: #6b7280; margin-bottom: 30px;">These emergencies were auto-routed to your NGO based on
            proximity. Accept a case to deploy your team.</p>

        <div id="loader">Scanning assigned queue...</div>
        <div id="poolContainer" style="display: none;"></div>

        <div id="emptyState" class="glass-card text-center" style="display: none; padding: 60px;">
            <div style="font-size: 3rem; margin-bottom: 20px;">✅</div>
            <h3>Queue Clear</h3>
            <p style="color: #6b7280;">No pending assignments routed to you right now.</p>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('poolContainer');
            const loader = document.getElementById('loader');
            const emptyState = document.getElementById('emptyState');

            try {
                const res = await window.API.get('/ngo/cases');
                // Only pending pool cases
                const poolCases = res.data.filter(c => c.status === 'pending_acceptance');

                loader.style.display = 'none';

                if (poolCases.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                container.style.display = 'block';
                poolCases.forEach(c => {
                    const el = document.createElement('div');
                    el.className = 'case-card';
                    el.innerHTML = `
                        <div class="header-bar">
                            <h3 style="margin:0;">${c.incident?.animalType || 'Unknown'} - ${c.incident?.concernType || 'Unknown'}</h3>
                            ${c.incident?.urgencyFlag ? '<span class="urgent-tag">🔴 CRITICAL SOS</span>' : ''}
                        </div>
                        <div class="meta"><strong>Location:</strong> Lat ${c.incident?.location?.coordinates[1]?.toFixed(5) || 0}, Lng ${c.incident?.location?.coordinates[0]?.toFixed(5) || 0}</div>
                        <div class="meta"><strong>Time:</strong> ${new Date(c.assignedAt || Date.now()).toLocaleString()}</div>
                        <p style="margin-top: 15px;">${c.incident?.description || 'No description'}</p>
                        
                        <div class="actions">
                            <button onclick="acceptCase('${c._id}')" class="btn btn-primary" style="padding: 8px 16px;">Accept & Deploy</button>
                            <button onclick="passCase('${c._id}')" class="btn btn-outline" style="padding: 8px 16px; border-color: #d1d5db; color: #4b5563;">Pass Case</button>
                        </div>
                    `;
                    container.appendChild(el);
                });

            } catch (e) {
                loader.innerText = "Error: " + e.message;
            }
        });

        async function acceptCase(assignmentId) {
            try {
                // The API needs to hit our Assignment status patch route
                await window.API.patch(`/ngo/cases/${assignmentId}/accept`, {});
                alert("Case Accepted! Moved to Active Cases.");
                window.location.reload();
            } catch (e) {
                alert("Failed to accept: " + e.message);
            }
        }

        async function passCase(assignmentId) {
            try {
                // Reject the case
                await window.API.patch(`/ngo/cases/${assignmentId}/reject`, {});
                alert("Case Passed. It has been re-pooled for other verification.");
                window.location.reload();
            } catch (e) {
                alert("Failed to pass case: " + e.message);
            }
        }
    </script>
    <script src="/js/layout.js"></script>

    <script>
        window.Layout.renderAppNav('nav-placeholder', 'NGO Portal');
        window.Layout.renderSidebar('sidebar-placeholder', 'ngo', 'pool');
    </script>
</body>

</html>
